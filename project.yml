name: ClipboardImageSaver
options:
  bundleIdPrefix: com.clipboard
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"
targets:
  ClipboardImageSaver:
    type: application
    platform: macOS
    sources:
      - ClipboardImageSaver
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipboard.ClipboardImageSaver
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: "Clipboard Image Saver"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_STYLE: Manual
        SWIFT_STRICT_CONCURRENCY: minimal
